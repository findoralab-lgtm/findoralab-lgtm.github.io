<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Моя страница с Botpress</title>
</head>
<body>
  <h1>Содержимое страницы</h1>

  <script>
    // Загружаем библиотеку Botpress
    (function() {
      var script = document.createElement('script');
      script.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";
      script.async = true;

      script.onload = function() {
        // Подождём, пока ботпессовский объект станет доступен
        (function waitForBotpress() {
          if (window.botpressWebChat && typeof window.botpressWebChat.init === 'function') {
            window.botpressWebChat.init({
              clientId: "1b2b8490-8eb3-4c3d-8e91-75182baff95b",
              messagingUrl: "https://messaging.botpress.cloud",
              hostUrl: "https://cdn.botpress.cloud/webchat/v3.6",
              showWidget: true
            });
          } else {
            setTimeout(waitForBotpress, 50);
          }
        })();
      };

      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
