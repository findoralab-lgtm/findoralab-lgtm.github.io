<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Моя страница с Botpress</title>
</head>
<body>
  <h1>Содержимое страницы</h1>

  <script>
    // Создаем тег script, чтобы загрузить библиотеку
    var script = document.createElement('script');
    script.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";

    // Когда скрипт загрузится — инициализируем виджет
    script.onload = function() {
      window.botpressWebChat.init({
        clientId: "1b2b8490-8eb3-4c3d-8e91-75182baff95b",
        messagingUrl: "https://messaging.botpress.cloud",
        hostUrl: "https://cdn.botpress.cloud/webchat/v3.6",
        showWidget: true
      });
    };

    // Добавляем скрипт в страницу
    document.body.appendChild(script);
  </script>
</body>
</html>
